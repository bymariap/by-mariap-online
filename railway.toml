# Railway usa este archivo desde la raíz del repo.
# El contexto de build es la raíz completa (necesario porque el Dockerfile
# copia packages/ y manifiestos del workspace).

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
startCommand = "node /app/apps/api/dist/src/main.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
